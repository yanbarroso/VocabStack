<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocabStack - Processador de Vocabulário</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .upload-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="file"]:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #btnUpload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #btnUpload:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        #btnUpload:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #btnLimpar {
            background: #e0e0e0;
            color: #333;
        }

        #btnLimpar:hover {
            background: #d0d0d0;
        }

        .status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .stat-card h3 {
            font-size: 0.9em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
        }

        .works-section {
            margin-top: 40px;
        }

        .works-section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .works-list {
            display: grid;
            gap: 15px;
        }

        .work-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .work-info {
            flex: 1;
        }

        .work-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .work-meta {
            font-size: 0.9em;
            color: #666;
        }

        .work-badge {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 VocabStack</h1>
            <p class="subtitle">Processador de Vocabulário e Análise Textual</p>
        </header>

        <div class="upload-section">
            <h2 style="color: #333; margin-bottom: 20px;">Processar Novo Arquivo</h2>
            
            <div class="form-group">
                <label for="titulo">Título da Obra</label>
                <input type="text" id="titulo" placeholder="Ex: O Pequeno Príncipe">
            </div>

            <div class="form-group">
                <label for="arquivo">Selecionar Arquivo</label>
                <input type="file" id="arquivo" accept=".pdf,.epub,.txt">
            </div>

            <div class="button-group">
                <button id="btnUpload">🚀 Processar Arquivo</button>
                <button id="btnLimpar">🗑️ Limpar</button>
            </div>

            <div id="statusMessage" class="status-message"></div>
        </div>

        <div class="stats-section">
            <div class="stat-card">
                <h3>Total de Obras</h3>
                <div class="value" id="totalObras">0</div>
            </div>
            <div class="stat-card">
                <h3>Total de Palavras</h3>
                <div class="value" id="totalPalavras">0</div>
            </div>
            <div class="stat-card">
                <h3>Palavras Únicas</h3>
                <div class="value" id="uniqueWords">0</div>
            </div>
        </div>

        <div class="works-section">
            <h2>📖 Sua Estante</h2>
            <div id="worksList" class="works-list"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        // Elementos DOM
        const inputTitulo = document.getElementById('titulo');
        const inputArquivo = document.getElementById('arquivo');
        const btnUpload = document.getElementById('btnUpload');
        const btnLimpar = document.getElementById('btnLimpar');
        const statusMessage = document.getElementById('statusMessage');
        const worksList = document.getElementById('worksList');
        const totalObras = document.getElementById('totalObras');
        const totalPalavras = document.getElementById('totalPalavras');
        const uniqueWords = document.getElementById('uniqueWords');

        // Mostrar mensagem de status
        function showStatus(message, type) {
            statusMessage.innerHTML = message;
            statusMessage.className = `status-message ${type}`;
            statusMessage.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    statusMessage.style.display = 'none';
                }, 5000);
            }
        }

        // Carregar obras
        async function loadWorks() {
            try {
                const response = await fetch(`${API_URL}/api/estante`);
                
                if (!response.ok) {
                    throw new Error(`Erro ${response.status}: ${response.statusText}`);
                }
                
                const works = await response.json();

                if (!Array.isArray(works) || works.length === 0) {
                    worksList.innerHTML = '<div class="empty-state"><p>Nenhuma obra processada ainda.</p><p>Envie um arquivo para começar!</p></div>';
                } else {
                    worksList.innerHTML = works.map(work => `
                        <div class="work-item">
                            <div class="work-info">
                                <div class="work-title">${work.titulo}</div>
                                <div class="work-meta">📊 ${work.total} palavras • 📅 ${new Date(work.data).toLocaleDateString('pt-BR')}</div>
                            </div>
                            <div class="work-badge">${work.total.toLocaleString()}</div>
                        </div>
                    `).join('');
                }

                totalObras.textContent = (Array.isArray(works) ? works.length : 0);
                
                // Calcular total de palavras
                const totalWords = Array.isArray(works) ? works.reduce((sum, work) => sum + work.total, 0) : 0;
                totalPalavras.textContent = totalWords.toLocaleString();
            } catch (error) {
                console.error('Erro ao carregar obras:', error);
                worksList.innerHTML = '<div class="empty-state"><p>❌ Erro ao conectar com a API</p></div>';
            }
        }

        // Upload de arquivo
        btnUpload.addEventListener('click', async () => {
            const arquivo = inputArquivo.files[0];
            const titulo = inputTitulo.value.trim();

            if (!titulo) {
                showStatus('⚠️ Digite o título da obra', 'error');
                return;
            }

            if (!arquivo) {
                showStatus('⚠️ Selecione um arquivo', 'error');
                return;
            }

            btnUpload.disabled = true;
            showStatus('<span class="loading-spinner"></span> Processando arquivo...', 'loading');

            const formData = new FormData();
            formData.append('titulo', titulo);
            formData.append('arquivo', arquivo);

            try {
                const response = await fetch(`${API_URL}/api/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    showStatus(`✅ "${titulo}" processado com sucesso!`, 'success');
                    inputTitulo.value = '';
                    inputArquivo.value = '';
                    loadWorks();
                } else {
                    throw new Error('Erro na resposta do servidor');
                }
            } catch (error) {
                console.error('Erro ao fazer upload:', error);
                showStatus('❌ Erro ao processar arquivo: ' + error.message, 'error');
            } finally {
                btnUpload.disabled = false;
            }
        });

        // Limpar formulário
        btnLimpar.addEventListener('click', () => {
            inputTitulo.value = '';
            inputArquivo.value = '';
            statusMessage.style.display = 'none';
        });

        // Carregar dados ao iniciar
        loadWorks();

        // Atualizar a cada 30 segundos
        setInterval(loadWorks, 30000);
    </script>
</body>
</html>
